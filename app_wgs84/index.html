<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>地铁网络演化地图 WGS84</title>
    <link rel="stylesheet" href="./styles.css?v=20260501-003" />
  </head>
  <body>
    <main class="app-shell">
      <canvas id="mapCanvas" aria-label="地铁网络演化地图"></canvas>

      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>地铁网络演化地图</h1>
            <p id="subtitle">WGS84 · OSM 底图 · 最新网络</p>
          </div>
        </div>

        <div class="toolbar" aria-label="地图控制">
          <label class="control compact">
            <span>范围</span>
            <select id="citySelect">
              <option value="">All</option>
            </select>
          </label>

          <label class="control compact">
            <span>线路</span>
            <select id="lineFilter">
              <option value="">全部线路</option>
            </select>
          </label>

          <label class="control compact">
            <span>站点</span>
            <select id="stationSearch" disabled>
              <option value="">先选择线路</option>
            </select>
          </label>

          <button id="locateStation" class="icon-button" title="定位站点" aria-label="定位站点">⌕</button>

          <label class="control small">
            <span>底图</span>
            <select id="basemapSelect">
              <option value="osm">OSM</option>
              <option value="cartoLight">浅色</option>
              <option value="cartoLightNoLabels" selected>浅色无标注</option>
              <option value="cartoDark">深色</option>
              <option value="cartoDarkNoLabels">深色无标注</option>
              <option value="none">无</option>
            </select>
          </label>

          <label class="control slider">
            <span>线宽</span>
            <input id="lineWidthRange" type="range" min="0.5" max="3" step="0.1" value="1" />
          </label>

          <label class="control slider">
            <span>站点</span>
            <input id="stationSizeRange" type="range" min="0.5" max="3" step="0.1" value="1" />
          </label>

          <label class="control toggle">
            <span>站名</span>
            <input id="stationLabelsToggle" type="checkbox" checked aria-label="显示站点名称" />
          </label>
        </div>
      </header>

      <section class="stats-panel" aria-label="当前统计">
        <div>
          <span class="stat-value" id="cityCount">0</span>
          <span class="stat-label">城市</span>
        </div>
        <div>
          <span class="stat-value" id="stationCount">0</span>
          <span class="stat-label">站点</span>
        </div>
        <div>
          <span class="stat-value" id="segmentCount">0</span>
          <span class="stat-label">区间</span>
        </div>
        <div>
          <span class="stat-value" id="lineCount">0</span>
          <span class="stat-label">线路</span>
        </div>
        <div>
          <span class="stat-value" id="newCount">0</span>
          <span class="stat-label">当年新增</span>
        </div>
        <div>
          <span class="stat-value" id="mileageCount">0</span>
          <span class="stat-label">里程 km</span>
        </div>
        <div>
          <span class="stat-value" id="newMileageCount">0</span>
          <span class="stat-label">新增里程 km</span>
        </div>
        <div class="stats-note">里程：高德地图的线路长度统计，非官方统计</div>
      </section>

      <aside class="route-panel" aria-label="路径搜索">
        <h2>路径搜索</h2>
        <div class="route-fields">
          <label>
            <span>起点</span>
            <input id="routeOrigin" type="search" list="routeStationOptions" placeholder="如：西单" autocomplete="off" />
          </label>
          <label>
            <span>终点</span>
            <input id="routeDestination" type="search" list="routeStationOptions" placeholder="如：东四十条" autocomplete="off" />
          </label>
          <datalist id="routeStationOptions"></datalist>
        </div>
        <div class="route-actions">
          <button id="routeSearch" type="button">搜索</button>
          <button id="routeClear" type="button">清除</button>
        </div>
        <div id="routeResult" class="route-result">选择城市和年份后输入起终点。</div>
      </aside>

      <aside class="detail-panel" aria-live="polite">
        <h2 id="detailTitle">全国网络</h2>
        <div id="detailBody" class="detail-body"></div>
      </aside>

      <div class="map-buttons" aria-label="视图控制">
        <button id="zoomIn" class="icon-button" title="放大" aria-label="放大">+</button>
        <button id="zoomOut" class="icon-button" title="缩小" aria-label="缩小">−</button>
        <button id="resetView" class="icon-button" title="重置视图" aria-label="重置视图">↺</button>
      </div>

      <div class="attribution">
        © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noreferrer">OpenStreetMap</a> contributors
      </div>

      <footer class="timeline">
        <button id="playToggle" class="icon-button timeline-button" title="播放/暂停" aria-label="播放或暂停">▶</button>
        <button id="latestYear" class="icon-button timeline-button" title="跳到最新年份" aria-label="跳到最新年份">»</button>
        <label class="speed-control">
          <span>速度</span>
          <select id="speedSelect">
            <option value="1200">0.5x</option>
            <option value="650" selected>1x</option>
            <option value="350">2x</option>
            <option value="180">4x</option>
          </select>
        </label>
        <div class="year-jumps" aria-label="快捷年份">
          <button type="button" data-year="2000">2000</button>
          <button type="button" data-year="2005">2005</button>
          <button type="button" data-year="2010">2010</button>
          <button type="button" data-year="2015">2015</button>
          <button type="button" data-year="2020">2020</button>
          <button type="button" data-year="2025">2025</button>
        </div>
        <label class="year-control">
          <span id="yearLabel">2026</span>
          <input id="yearRange" type="range" min="1971" max="2026" value="2026" />
        </label>
      </footer>
    </main>

    <script src="./main.js?v=20260501-003"></script>
  </body>
</html>
